<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>メッセージアプリ</title>

<style>
body {
  background:#F5F8F9;
  font-family:sans-serif;
  margin:0;
  height:100vh;
  display:flex;
  flex-direction:column;
}

/* チャット領域は伸縮し、常にフォームを画面下に残す */
#chat-container {
  flex:1;
  overflow-y:auto;
  padding:10px;
  display:flex;
  flex-direction:column;
}

/* バルーン */
.message {
  position:relative;
  max-width:70%;
  padding:10px;
  border-radius:15px;
  margin-bottom:10px;
  display:flex;
  flex-direction:column;
}

.right { background:#DCF8C6; align-self:flex-end; }
.left  { background:#FFFFFF; align-self:flex-start; }

.message-info {
  font-size:10px;
  color:#666;
  margin-bottom:5px;
  white-space:pre-line;
}

.message img {
  max-width:180px;
  border-radius:10px;
  margin-bottom:5px;
}

.delete-button {
  position:absolute;
  top:5px;
  right:5px;
  font-size:12px;
  color:#888;
  cursor:pointer;
}

/* 入力フォームは常に画面下固定 */
#form-container {
  background:#fff;
  border-top:1px solid #ddd;
  padding:10px;
  display:flex;
  flex-direction:column;
}

/* 全体に安全な幅指定を適用 */
* {
  box-sizing: border-box;
}

/* 下部の入力フォーム全体 */
#form-container {
  width: 100%;
  padding: 10px;
}

/* テキスト入力欄（スマホで100%に収まる） */
#message-input {
  width: 100%;
  height: 60px;
  margin-bottom: 8px;
  box-sizing: border-box; /* ←これが重要 */
}

/* スマホ用調整 */
@media screen and (max-width:600px) {
  #message-input {
    height: 80px;
    width: 100%;
    box-sizing: border-box;
  }
}

#speaker { width:120px; margin-bottom:8px; padding:6px; }

#message-input { height:60px; margin-bottom:8px; width:100%; }

#image-input { margin-bottom:8px; }

#send-btn {
  width:100%;
  padding:10px;
  background:#48A8F0;
  color:#fff;
  border:none;
  border-radius:6px;
}

@media screen and (max-width:600px) {
  #message-input { height:80px; }
}
</style>
</head>

<body>

<div id="chat-container"></div>

<div id="form-container">
  <select id="speaker">
    <option value="right">なずな</option>
    <option value="left">みゆき</option>
  </select>

  <textarea id="message-input" placeholder="メッセージを入力"></textarea>

  <input type="file" id="image-input" accept="image/*">

  <button id="send-btn" onclick="sendMessage()">送信</button>
</div>

<script>
/* IndexedDB */
let db;
const request=indexedDB.open("chatDB",1);

request.onupgradeneeded=e=>{
  db=e.target.result;
  db.createObjectStore("messages",{keyPath:"id"});
};

request.onsuccess=e=>{
  db=e.target.result;
  loadMessages();
};

/* 時刻 */
function getTime(){
  const d=new Date();
  return ('0'+d.getHours()).slice(-2)+":"+('0'+d.getMinutes()).slice(-2);
}

/* メッセージ DOM 生成 */
function createMsg(m){
  const el=document.createElement("div");
  el.className="message "+m.alignment;
  el.id=m.id;

  const info=document.createElement("div");
  info.className="message-info";
  info.textContent=m.speaker+"\n"+m.time;
  el.appendChild(info);

  if(m.image){
    const img=document.createElement("img");
    img.src=m.image;
    el.appendChild(img);
  }

  if(m.message){
    const t=document.createElement("div");
    t.textContent=m.message;
    el.appendChild(t);
  }

  const del=document.createElement("div");
  del.className="delete-button";
  del.textContent="✕";
  del.onclick=()=>deleteMessage(m.id);
  el.appendChild(del);

  return el;
}

/* 送信 */
function sendMessage(){
  const sp=document.getElementById("speaker");
  const speaker=sp.options[sp.selectedIndex].text;
  const alignment=sp.value;  /* ← これでなずな＝right、みゆき＝left が正しく反映 */

  const msg=document.getElementById("message-input").value;
  const file=document.getElementById("image-input").files[0];

  const id=Date.now();

  if(!msg && !file) return;

  if(file){
    const r=new FileReader();
    r.onload=()=>save({
      id,
      speaker,
      message:msg,
      image:r.result,
      time:getTime(),
      alignment
    });
    r.readAsDataURL(file);
  } else {
    save({
      id,
      speaker,
      message:msg,
      image:null,
      time:getTime(),
      alignment
    });
  }

  document.getElementById("message-input").value="";
  document.getElementById("image-input").value="";
}

/* 保存 → 表示 */
function save(data){
  const tx=db.transaction("messages","readwrite");
  tx.objectStore("messages").put(data);

  document.getElementById("chat-container")
    .appendChild(createMsg(data));
}

/* 削除 */
function deleteMessage(id){
  if(!confirm("本当に削除しますか？")) return;

  const tx=db.transaction("messages","readwrite");
  tx.objectStore("messages").delete(id);

  document.getElementById(id)?.remove();
}

/* ロード */
function loadMessages(){
  const tx=db.transaction("messages","readonly");
  const store=tx.objectStore("messages");

  const req=store.getAll();
  req.onsuccess=()=>{
    const data=req.result.sort((a,b)=>a.id-b.id);
    const chat=document.getElementById("chat-container");
    data.forEach(m=>chat.appendChild(createMsg(m)));
  };
}
</script>

</body>
</html>
