<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>メッセージアプリ</title>
  <style>
    /* 吹き出しの形のスタイリング */
    .message {
      position: relative;
      max-width: 70%;
      padding: 10px;
      border-radius: 15px;
      margin-bottom: 10px;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
    }

    /* 右側の吹き出し */
    .right {
      background-color: #6FCF97;
      color: #fff;
      align-self: flex-end;
    }

    /* 左側の吹き出し */
    .left {
      background-color: #E0E0E0;
      color: #000;
      align-self: flex-start;
    }

    /* 削除ボタンのスタイリング */
    .delete-button {
      cursor: pointer;
      color: #888;
      font-size: 12px;
      position: absolute;
      top: 5px;
      right: 5px;
    }

    /* ユーザー名と日時のスタイリング */
    .message-info {
      font-size: 10px;
      color: #888;
      margin-bottom: 5px;
    }

    /* チャットコンテナのスタイリング */
    #chat-container {
      display: flex;
      flex-direction: column-reverse;
      max-height: 300px;
      overflow-y: auto;
      padding: 10px;
    }

    /* フォームとボタンのスタイリング */
    #form-container {
      display: flex;
      align-items: center;
      margin: 10px;
    }

    #speaker, #message-input, button {
      margin-right: 10px;
    }

    /* メッセージ入力欄の縦幅と横幅 */
    #message-input {
      height: 40px;
      width: 100%;
    }

    /* プルダウンのスタイリング */
    #speaker {
      height: 40px;
      font-size: 16px;
    }

    /* モバイルデバイスの場合のスタイル */
    @media screen and (max-width: 600px) {
      #message-input, #speaker {
        height: 80px;
      }

      #form-container {
        flex-direction: column;
      }

      /* プルダウンを左寄せに修正 */
      #speaker {
        margin-right: 0;
      }
    }

    /* モーダルのスタイリング */
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0, 0, 0, 0.5);
      justify-content: center;
      align-items: center;
    }

    .modal-content {
      background-color: #fff;
      padding: 20px;
      border-radius: 10px;
    }

    .close-button {
      cursor: pointer;
      position: absolute;
      top: 10px;
      right: 10px;
    }
  </style>
</head>
<body>

  <div id="chat-container"></div>

  <div id="form-container">
    <select id="speaker">
      <option value="right">なずな</option>
      <option value="left">みゆき</option>
    </select>

    <!-- textareaに変更 -->
    <textarea id="message-input" placeholder="メッセージを入力"></textarea>
    <button onclick="sendMessage()">送信</button>
  </div>

  <!-- モーダル -->
  <div id="myModal" class="modal">
    <div class="modal-content">
      <span class="close-button" onclick="closeModal()">&times;</span>
      <h2>話者名を変更</h2>
      <label for="new-speaker">新しい話者名：</label>
      <input type="text" id="new-speaker">
      <button onclick="changeSpeaker()">変更</button>
    </div>
  </div>

  <script>
    function getCurrentTime() {
      const now = new Date();
      const hours = ('0' + now.getHours()).slice(-2); // 0埋め
      const minutes = ('0' + now.getMinutes()).slice(-2); // 0埋め
      return `${hours}:${minutes}`;
    }

    function createMessageElement({ speaker, message, time, alignment, id }) {
      const messageElement = document.createElement("div");
      messageElement.className = "message " + alignment;
      messageElement.id = id;

      // ユーザー名と日時の表示
      const messageInfo = document.createElement("div");
      messageInfo.className = "message-info";
      messageInfo.textContent = `${speaker}\n${time}`;
      messageElement.appendChild(messageInfo);

      // メッセージ本文
      const messageText = document.createElement("div");
      messageText.textContent = message;
      messageElement.appendChild(messageText);

      // 削除ボタン
      const deleteButton = document.createElement("div");
      deleteButton.className = "delete-button";
      deleteButton.textContent = "✕";
      deleteButton.onclick = function () {
        deleteMessage(id);
      };
      messageElement.appendChild(deleteButton);

      return messageElement;
    }

    function sendMessage() {
      const speakerElement = document.getElementById("speaker");
      const speaker = speakerElement.options[speakerElement.selectedIndex].text;
      const message = document.getElementById("message-input").value;

      const chatContainer = document.getElementById("chat-container");
      const alignment = speakerElement.value === "right" ? "right" : "left";
      const id = new Date().getTime().toString(); // 一意のIDを生成

      const messageInfo = {
        id: id,
        speaker: speaker,
        message: message,
        time: getCurrentTime(),
        alignment: alignment
      };

      const messageElement = createMessageElement(messageInfo);

      // チャットコンテナにメッセージを追加
      chatContainer.insertBefore(messageElement, chatContainer.firstChild);

      // 入力欄をクリア
      document.getElementById("message-input").value = "";

      // メッセージをローカルストレージに保存
      saveMessageToLocalStorage(messageInfo);
    }

    function deleteMessage(id) {
      const messages = JSON.parse(localStorage.getItem('messages')) || [];

      // 対応するIDのメッセージを削除
      const updatedMessages = messages.filter(message => message.id !== id);

      localStorage.setItem('messages', JSON.stringify(updatedMessages));

      // チャットコンテナからも削除
      const messageElement = document.getElementById(id);
      if (messageElement) {
        messageElement.remove();
      }
    }

    function loadMessagesFromLocalStorage() {
      const messages = JSON.parse(localStorage.getItem('messages')) || [];

      const chatContainer = document.getElementById("chat-container");

      messages.forEach(messageInfo => {
        const messageElement = createMessageElement(messageInfo);
        messageElement.id = messageInfo.id;
        chatContainer.appendChild(messageElement);
      });
    }

    window.onload = function () {
      loadMessagesFromLocalStorage();
    };

    // モーダル関連の処理
    function openModal() {
      const modal = document.getElementById("myModal");
      modal.style.display = "flex";
    }

    function closeModal() {
      const modal = document.getElementById("myModal");
      modal.style.display = "none";
    }

    function changeSpeaker() {
      const newSpeaker = document.getElementById("new-speaker").value;
      if (newSpeaker.trim() !== "") {
        document.getElementById("speaker").options[speakerElement.selectedIndex].text = newSpeaker;
        closeModal();
      }
    }
  </script>

</body>
</html>
