<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LINE風メッセージアプリ</title>
  <style>
    /* ページ背景（LINE風） */
    body {
      background-color: #F5F8F9;
      font-family: sans-serif;
      margin: 0;
      padding: 0;
    }

    /* チャットコンテナ（通常表示） */
    #chat-container {
      display: flex;
      flex-direction: column; /* ← column-reverse をやめる */
      max-height: 350px;
      overflow-y: auto;
      padding: 10px;
    }

    /* 吹き出し */
    .message {
      position: relative;
      max-width: 70%;
      padding: 10px;
      border-radius: 15px;
      margin-bottom: 10px;
      display: flex;
      flex-direction: column;
    }

    /* 右側：自分（LINE風の淡いグリーン） */
    .right {
      background-color: #DCF8C6;
      color: #000;
      align-self: flex-end;
    }

    /* 左側：相手（白） */
    .left {
      background-color: #FFFFFF;
      color: #000;
      align-self: flex-start;
    }

    /* 削除ボタン */
    .delete-button {
      cursor: pointer;
      color: #888;
      font-size: 12px;
      position: absolute;
      top: 5px;
      right: 5px;
    }

    /* 名前＋時刻 */
    .message-info {
      font-size: 10px;
      color: #666;
      margin-bottom: 5px;
      white-space: pre-line;
    }

    /* 入力フォーム */
    #form-container {
      display: flex;
      align-items: center;
      padding: 10px;
    }

    #speaker, #message-input, button {
      margin-right: 10px;
    }

    #message-input {
      height: 40px;
      width: 100%;
    }

    /* 日付ラベル（中央表示） */
    .date-label {
      text-align: center;
      color: #888;
      font-size: 12px;
      margin: 10px 0;
    }

    /* モーダル */
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0, 0, 0, 0.5);
      justify-content: center;
      align-items: center;
    }

    .modal-content {
      background-color: #fff;
      padding: 20px;
      border-radius: 10px;
      position: relative;
    }

    .close-button {
      cursor: pointer;
      position: absolute;
      top: 10px;
      right: 10px;
    }
  </style>
</head>
<body>

  <div id="chat-container"></div>

  <div id="form-container">
    <select id="speaker">
      <option value="right">なずな</option>
      <option value="left">みゆき</option>
    </select>

    <textarea id="message-input" placeholder="メッセージを入力"></textarea>
    <button onclick="sendMessage()">送信</button>
  </div>

  <!-- モーダル -->
  <div id="myModal" class="modal">
    <div class="modal-content">
      <span class="close-button" onclick="closeModal()">&times;</span>
      <h2>話者名を変更</h2>
      <label>新しい話者名：</label>
      <input type="text" id="new-speaker">
      <button onclick="changeSpeaker()">変更</button>
    </div>
  </div>

  <script>
    /* ---------- 時刻 ---------- */
    function getCurrentTime() {
      const now = new Date();
      const h = ('0' + now.getHours()).slice(-2);
      const m = ('0' + now.getMinutes()).slice(-2);
      return `${h}:${m}`;
    }

    /* ---------- 日付 ---------- */
    function getTodayDateString() {
      const now = new Date();
      return `${now.getFullYear()}/${now.getMonth() + 1}/${now.getDate()}`;
    }

    function createDateLabel(dateString) {
      const dateLabel = document.createElement("div");
      dateLabel.className = "date-label";
      dateLabel.textContent = dateString;
      return dateLabel;
    }

    /* ---------- メッセージ要素 ---------- */
    function createMessageElement({ speaker, message, time, alignment, id }) {
      const messageElement = document.createElement("div");
      messageElement.className = "message " + alignment;
      messageElement.id = id;

      const messageInfo = document.createElement("div");
      messageInfo.className = "message-info";
      messageInfo.textContent = `${speaker}\n${time}`;
      messageElement.appendChild(messageInfo);

      const text = document.createElement("div");
      text.textContent = message;
      messageElement.appendChild(text);

      const deleteButton = document.createElement("div");
      deleteButton.className = "delete-button";
      deleteButton.textContent = "✕";
      deleteButton.onclick = () => deleteMessage(id);
      messageElement.appendChild(deleteButton);

      return messageElement;
    }

    /* ---------- メッセージ送信 ---------- */
    function sendMessage() {
      const speakerElement = document.getElementById("speaker");
      const speaker = speakerElement.options[speakerElement.selectedIndex].text;
      const message = document.getElementById("message-input").value;

      if (message.trim() === "") return;

      const chatContainer = document.getElementById("chat-container");
      const alignment = speakerElement.value === "right" ? "right" : "left";
      const id = new Date().getTime().toString();

      const today = getTodayDateString();
      const lastDate = chatContainer.getAttribute("data-last-date");

      /* 日付が変わったらラベルを挿入 */
      if (lastDate !== today) {
        const dateLabel = createDateLabel(today);
        chatContainer.appendChild(dateLabel); /* ← 修正 */
        chatContainer.setAttribute("data-last-date", today);
      }

      const messageInfo = {
        id,
        speaker,
        message,
        time: getCurrentTime(),
        alignment,
        date: today
      };

      const messageElement = createMessageElement(messageInfo);

      /* 送信時も末尾に追加（順序が揃う） */
      chatContainer.appendChild(messageElement);

      document.getElementById("message-input").value = "";

      saveMessageToLocalStorage(messageInfo);
    }

    /* ---------- 削除 ---------- */
    function deleteMessage(id) {
      let messages = JSON.parse(localStorage.getItem('messages')) || [];
      messages = messages.filter(msg => msg.id !== id);
      localStorage.setItem('messages', JSON.stringify(messages));

      const el = document.getElementById(id);
      if (el) el.remove();
    }

    /* ---------- ローカルストレージ ---------- */
    function saveMessageToLocalStorage(msg) {
      const messages = JSON.parse(localStorage.getItem('messages')) || [];
      messages.push(msg);
      localStorage.setItem('messages', JSON.stringify(messages));
    }

    function loadMessagesFromLocalStorage() {
      const messages = JSON.parse(localStorage.getItem('messages')) || [];
      const chatContainer = document.getElementById("chat-container");

      let lastDate = null;

      /* 保存されている順のまま「下へ追加」される */
      messages.forEach(messageInfo => {

        if (lastDate !== messageInfo.date) {
          const dateLabel = createDateLabel(messageInfo.date);
          chatContainer.appendChild(dateLabel);
          lastDate = messageInfo.date;
        }

        const el = createMessageElement(messageInfo);
        chatContainer.appendChild(el);
      });

      chatContainer.setAttribute("data-last-date", lastDate);
    }

    window.onload = () => {
      loadMessagesFromLocalStorage();
    };

    /* ---------- モーダル ---------- */
    function openModal() {
      document.getElementById("myModal").style.display = "flex";
    }

    function closeModal() {
      document.getElementById("myModal").style.display = "none";
    }

    function changeSpeaker() {
      const newName = document.getElementById("new-speaker").value;
      const speakerElement = document.getElementById("speaker");
      if (newName.trim() !== "") {
        speakerElement.options[speakerElement.selectedIndex].text = newName;
        closeModal();
      }
    }
  </script>

</body>
</html>
