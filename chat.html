<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>メッセージアプリ</title>
  <style>
    body {
      background-color: #F5F8F9;
      font-family: sans-serif;
      margin: 0;
      padding: 0;
    }

    #chat-container {
      display: flex;
      flex-direction: column;
      max-height: 350px;
      overflow-y: auto;
      padding: 10px;
    }

    .message {
      position: relative;
      max-width: 70%;
      padding: 10px;
      border-radius: 15px;
      margin-bottom: 10px;
      display: flex;
      flex-direction: column;
    }

    .right {
      background-color: #DCF8C6;
      color: #000;
      align-self: flex-end;
    }

    .left {
      background-color: #FFFFFF;
      color: #000;
      align-self: flex-start;
    }

    .delete-button {
      cursor: pointer;
      color: #888;
      font-size: 12px;
      position: absolute;
      top: 5px;
      right: 5px;
    }

    .message-info {
      font-size: 10px;
      color: #666;
      margin-bottom: 5px;
      white-space: pre-line;
    }

    /* ← 画像が大きすぎるのを防ぐ */
    .message img {
      max-width: 180px;
      border-radius: 10px;
      margin-bottom: 5px;
    }

    #form-container {
      display: flex;
      flex-direction: column;
      padding: 10px;
    }

    #speaker, #message-input, button, #image-input {
      margin-bottom: 10px;
    }

    #message-input {
      height: 40px;
      width: 100%;
    }

    .date-label {
      text-align: center;
      color: #888;
      font-size: 12px;
      margin: 10px 0;
    }

  </style>
</head>
<body>

  <div id="chat-container"></div>

  <div id="form-container">
    <select id="speaker">
      <option value="right">なずな</option>
      <option value="left">みゆき</option>
    </select>

    <textarea id="message-input" placeholder="メッセージを入力"></textarea>

    <!-- 🔥 画像投稿追加 -->
    <input type="file" id="image-input" accept="image/*">

    <button onclick="sendMessage()">送信</button>
  </div>

  <script>
    /* ---------- 時刻 ---------- */
    function getCurrentTime() {
      const now = new Date();
      const h = ('0' + now.getHours()).slice(-2);
      const m = ('0' + now.getMinutes()).slice(-2);
      return `${h}:${m}`;
    }

    /* ---------- 日付 ---------- */
    function getTodayDateString() {
      const now = new Date();
      return `${now.getFullYear()}/${now.getMonth() + 1}/${now.getDate()}`;
    }

    function createDateLabel(dateString) {
      const dateLabel = document.createElement("div");
      dateLabel.className = "date-label";
      dateLabel.textContent = dateString;
      return dateLabel;
    }

    /* ---------- メッセージ要素作成 ---------- */
    function createMessageElement({ speaker, message, time, alignment, id, image }) {
      const messageElement = document.createElement("div");
      messageElement.className = "message " + alignment;
      messageElement.id = id;

      const info = document.createElement("div");
      info.className = "message-info";
      info.textContent = `${speaker}\n${time}`;
      messageElement.appendChild(info);

      /* 🔥 画像があれば表示 */
      if (image) {
        const img = document.createElement("img");
        img.src = image;
        messageElement.appendChild(img);
      }

      /* テキストがあれば表示 */
      if (message && message.trim() !== "") {
        const text = document.createElement("div");
        text.textContent = message;
        messageElement.appendChild(text);
      }

      const del = document.createElement("div");
      del.className = "delete-button";
      del.textContent = "✕";
      del.onclick = () => deleteMessage(id);
      messageElement.appendChild(del);

      return messageElement;
    }

    /* ---------- メッセージ送信 ---------- */
    function sendMessage() {
      const speakerElement = document.getElementById("speaker");
      const speaker = speakerElement.options[speakerElement.selectedIndex].text;
      const message = document.getElementById("message-input").value;
      const file = document.getElementById("image-input").files[0];

      const alignment = speakerElement.value === "right" ? "right" : "left";
      const id = Date.now().toString();
      const today = getTodayDateString();

      const chatContainer = document.getElementById("chat-container");
      const lastDate = chatContainer.getAttribute("data-last-date");

      /* 日付ラベル挿入 */
      if (lastDate !== today) {
        chatContainer.appendChild(createDateLabel(today));
        chatContainer.setAttribute("data-last-date", today);
      }

      /* テキストも画像も無い場合は送信しない */
      if (!message.trim() && !file) return;

      /* 画像を読み込み → base64化 → 保存 */
      if (file) {
        const reader = new FileReader();
        reader.onload = () => {
          postMessage({
            id, speaker, message, alignment,
            image: reader.result,
            time: getCurrentTime(),
            date: today,
          });
        };
        reader.readAsDataURL(file);
      } else {
        postMessage({
          id, speaker, message, alignment,
          image: null,
          time: getCurrentTime(),
          date: today,
        });
      }

      document.getElementById("message-input").value = "";
      document.getElementById("image-input").value = "";
    }

    /* ---------- メッセージ追加＆保存 ---------- */
    function postMessage(info) {
      const chatContainer = document.getElementById("chat-container");
      chatContainer.appendChild(createMessageElement(info));
      saveToLocal(info);
    }

    function saveToLocal(info) {
      const messages = JSON.parse(localStorage.getItem("messages")) || [];
      messages.push(info);
      localStorage.setItem("messages", JSON.stringify(messages));
    }

    /* ---------- 削除 ---------- */
    function deleteMessage(id) {
      let messages = JSON.parse(localStorage.getItem("messages")) || [];
      messages = messages.filter(m => m.id !== id);
      localStorage.setItem("messages", JSON.stringify(messages));

      const el = document.getElementById(id);
      if (el) el.remove();
    }

    /* ---------- ロード ---------- */
    function loadMessages() {
      const messages = JSON.parse(localStorage.getItem("messages")) || [];
      const chatContainer = document.getElementById("chat-container");

      let lastDate = null;

      messages.forEach(info => {
        if (lastDate !== info.date) {
          chatContainer.appendChild(createDateLabel(info.date));
          lastDate = info.date;
        }
        chatContainer.appendChild(createMessageElement(info));
      });

      chatContainer.setAttribute("data-last-date", lastDate);
    }

    window.onload = loadMessages;
  </script>

</body>
</html>
